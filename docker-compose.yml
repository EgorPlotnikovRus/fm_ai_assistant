services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: config.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "8001:8001"
    depends_on:
      backend:
        condition: service_healthy
    env_file: config.env
